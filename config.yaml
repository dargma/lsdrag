# config.yaml — 경로·모델·엔드포인트의 단일 출처.
# 키(시크릿)는 여기 두지 마라. 환경변수/.env 에서만 읽는다.
# 단계별로 묶었다: [1 파싱] [2 DB 구축] [3 검색]. 단계를 통째로 바꾸려면 그 블록만 손댄다.

# ── [1. 파싱] 파서 (교체 경계: adapter.py + 아래 블록) ────────────────
parser:
  provider: upstage
  endpoint: "https://api.upstage.ai/v1/document-digitization"
  model: "document-parse"
  api_key_env: "UP_TOKEN"          # 키는 이 환경변수에서 읽는다 (평문 금지)
  base64_categories: ["figure", "chart"]   # 이미지로 crop할 카테고리(표는 HTML 구조로 저장, 이미지 불필요)

# ── [2. DB 구축] 임베더 + 저장 경로 (교체 경계: embedding.model) ───────
embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"   # 예: "Qwen/Qwen3-Embedding-0.6B"
  # 작은 모델이라 로컬 자동 로드. 별도 서빙·GPU 불필요.

engine:
  root: "."                         # 엔진(src/) 위치. 배포된 skill이 이걸로 엔진을 찾는다(절대경로 하드코딩 금지)

paths:
  docs_in:     "./data/docs_in"     # 입력 PDF (분할본)
  ir_out:      "./data/ir"          # 파싱 산출 IR(JSON)
  images_out:  "./data/images"      # figure/chart 이미지 (image_path가 가리킴)
  index:       "./data/index"       # 벡터 인덱스
  page_index:  "./data/page_index"  # 구조 메타데이터 인덱스

# ── [3. 검색] Reader/VLM + agent loop (교체 경계: reader 블록) ─────────
# 설치 시 Reader를 선택: provider 한 줄만 바꾸면 endpoint/model/key가 프리셋으로 채워진다.
#   provider: claude_code → 지금 Claude Code에서 도는 모델(로컬 `claude` CLI) — API·키 불필요(권장)
#   provider: openai      → GPT-4.1 mini (키: OPENAI_API_KEY)
#   provider: anthropic   → Claude API (키: ANTHROPIC_API_KEY, 모델 선택 가능)
# endpoint/model/api_key_env를 직접 적으면 프리셋보다 우선(override). 키는 env, 평문 금지.
reader:
  provider: claude_code
  # model: "gpt-4.1-mini"          # (선택) 프리셋 override. anthropic이면 예: "claude-sonnet-4-6"
  # api_key_env: "OPENAI_API_KEY"  # (선택) 프리셋 override

agent:
  max_loops: 10
  max_token_budget: 128000
